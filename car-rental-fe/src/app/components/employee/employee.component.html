<div class ="container mt-5">
  <div class="row">
    <table class="table table-striped">
      <thead>
      <tr>
        <th>Name</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>

      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let employee of employees">
        <td>{{employee.name}}</td>
        <td>{{employee.username}}</td>
        <td>{{employee.email}}</td>
        <td>{{employee.role.roleId}}</td>
      </tr>

      </tbody>

    </table>

  </div>

</div>
