<div class ="container mt-5">
    <div class="row">
        <table class="table table-striped">
            <thead>
            <tr>

                <th>Username</th>
                <th>Email</th>


            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let customer of customers">
                <td>{{customer.name}}</td>
                <td>{{customer.email}}</td>

            </tr>

            </tbody>

        </table>

    </div>

</div>
