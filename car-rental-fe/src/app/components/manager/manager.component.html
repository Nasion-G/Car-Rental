<div class ="container mt-5">
  <div class="row">
    <table class="table table-striped">
      <thead>
      <tr>
        <th>Username</th>
        <th>Role</th>

      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let employee of employees">
        <td>{{employee.username}}</td>
        <td>{{employee.role.roleId}}</td>
      </tr>

      </tbody>

    </table>
    <button class="btn btn-lg btn-primary btn-block mt-2" type="button" >Sign in</button>

  </div>

</div>
